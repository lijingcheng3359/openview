# Example configuration file
[server]
host = 0.0.0.0
port = 8080
workers = 4

[database]
driver = postgresql
host = localhost
port = 5432
name = myapp_db
user = admin
password = secret123
pool_size = 10

[logging]
level = info
format = json
file = /var/log/myapp/app.log
max_size = 100M
rotate = 7

[cache]
enabled = true
backend = redis
url = redis://localhost:6379/0
ttl = 3600
